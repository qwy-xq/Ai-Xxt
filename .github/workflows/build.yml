name: Build Android Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 防止多个 push 同时跑构建，串行排队即可
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: assembleDebug
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        # AGP 9.x 要求 JDK 17+
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK (cmdline-tools + platform 36)
        uses: android-actions/setup-android@v3
        with:
          # compileSdk 36 对应 Android 16 (Baklava) preview，按需调整
          api-level: 36
          build-tools-version: 36.0.0
          # 加这几个组件，避免后续 gradle 调用时再下载浪费时间
          components: platform-tools,platforms;android-36,build-tools;36.0.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show Gradle / Java versions
        run: |
          ./gradlew --version
          java -version

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        env:
          # 关掉 daemon，省 CI 资源
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          ls -la app/build/outputs/apk/debug/
          file app/build/outputs/apk/debug/*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aixxt-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
          # compression-level: 0 — store without compression so the
          # inner APK's local file headers are preserved byte-for-byte.
          # (compressed zip containers were observed to corrupt the
          # APK's central directory on download via PowerShell.)
          compression-level: 0

      - name: Dump APK SHA256 to log
        run: |
          sha256sum app/build/outputs/apk/debug/*.apk
          echo "ARTIFACT_PATH=app/build/outputs/apk/debug/app-debug.apk"
          echo "ARTIFACT_SIZE=$(stat -c%s app/build/outputs/apk/debug/app-debug.apk)"

      - name: Upload build report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/**
            **/build/reports/**
          retention-days: 7